<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Регистрация | Курсы Диспетчера</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --bg-darker: #020617;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-darker);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 0;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(circle at 20% 50%, rgba(99, 102, 241, 0.15) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(139, 92, 246, 0.15) 0%, transparent 50%);
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 480px;
      width: 100%;
      padding: 0 24px;
    }

    .card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 32px;
      padding: 48px;
      backdrop-filter: blur(20px);
    }

    .logo {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-icon {
      font-size: 56px;
    }

    .logo-text {
      font-size: 24px;
      font-weight: 800;
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 28px;
      font-size: 14px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 13px 14px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      transition: all 0.3s;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
      background: rgba(255, 255, 255, 0.08);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .checkbox-group {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 20px;
    }

    .checkbox-group input[type="checkbox"] {
      width: 16px;
      height: 16px;
      margin-top: 3px;
      flex-shrink: 0;
    }

    .checkbox-group label {
      font-size: 13px;
      color: var(--text-secondary);
      font-weight: 400;
    }

    .checkbox-group label a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      border: none;
      border-radius: 12px;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(99, 102, 241, 0.4);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .divider {
      text-align: center;
      margin: 24px 0;
      position: relative;
    }

    .divider::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 0;
      right: 0;
      height: 1px;
      background: rgba(255, 255, 255, 0.1);
    }

    .divider span {
      background: #020617;
      padding: 0 14px;
      position: relative;
      color: var(--text-muted);
      font-size: 13px;
    }

    .btn-google {
      width: 100%;
      padding: 13px;
      background: white;
      border: none;
      border-radius: 12px;
      color: #1f2937;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .btn-google:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
    }

    .btn-google img {
      width: 20px;
      height: 20px;
    }

    .bottom-link {
      text-align: center;
      margin-top: 24px;
      color: var(--text-secondary);
      font-size: 14px;
    }

    .bottom-link a {
      color: var(--primary);
      text-decoration: none;
      font-weight: 700;
    }

    .back {
      text-align: center;
      margin-top: 16px;
    }

    .back a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 13px;
    }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      border-radius: 10px;
      padding: 12px 14px;
      color: #fca5a5;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    .success-msg {
      background: rgba(16, 185, 129, 0.1);
      border: 1px solid rgba(16, 185, 129, 0.3);
      border-radius: 10px;
      padding: 12px 14px;
      color: #6ee7b7;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
    }

    @media (max-width: 480px) {
      .card {
        padding: 32px 20px;
      }

      .form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="card">
      <div class="logo">
        <div class="logo-icon">🎓</div>
        <div class="logo-text">Курсы Диспетчера</div>
      </div>
      <h1>Регистрация</h1>
      <p class="subtitle">Создайте аккаунт и начните обучение</p>

      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <form id="registerForm">
        <div class="form-row">
          <div>
            <label>Имя</label>
            <input type="text" id="firstName" placeholder="Иван" required>
          </div>
          <div>
            <label>Фамилия</label>
            <input type="text" id="lastName" placeholder="Иванов" required>
          </div>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="your@email.com" required>
        </div>
        <div class="form-group">
          <label>Номер телефона <span style="color: var(--text-muted); font-weight: 400;">(необязательно)</span></label>
          <input type="tel" id="phone" placeholder="+1 (555) 123-4567">
        </div>
        <div class="form-group">
          <label>Пароль</label>
          <input type="password" id="password" placeholder="Минимум 8 символов" required minlength="8">
        </div>
        <div class="form-group">
          <label>Подтвердите пароль</label>
          <input type="password" id="confirmPassword" placeholder="Повторите пароль" required minlength="8">
        </div>
        <div class="checkbox-group">
          <input type="checkbox" id="terms" required>
          <label for="terms">Я согласен с <a href="#">условиями использования</a> и <a href="#">политикой
              конфиденциальности</a></label>
        </div>
        <button type="submit" class="btn" id="submitBtn">Создать аккаунт</button>
      </form>

      <div class="divider"><span>или</span></div>

      <button class="btn-google" id="googleBtn">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Продолжить с Google
      </button>

      <div class="bottom-link">Уже есть аккаунт? <a href="login.html">Войти</a></div>
      <div class="back"><a href="index.html">← Вернуться на главную</a></div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, updateProfile } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyC505dhT1WjUPhXbinqLvEOTlEXWxYy8GI",
      authDomain: "dispatch4you-80e0f.firebaseapp.com",
      projectId: "dispatch4you-80e0f",
      storageBucket: "dispatch4you-80e0f.firebasestorage.app",
      messagingSenderId: "349235354473",
      appId: "1:349235354473:web:488aeb29211b02bb153bf8"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    function saveUserToFirestore(user, firstName, lastName, phone = '', additionalData = {}) {
      const userData = {
        uid: user.uid, firstName, lastName,
        email: user.email,
        displayName: user.displayName || (firstName + ' ' + lastName),
        photoURL: user.photoURL || '',
        lastLogin: serverTimestamp(),
        provider: user.providerData[0]?.providerId || 'password',
        ...additionalData
      };

      // Добавляем телефон только если он указан
      if (phone && phone.trim()) {
        userData.phone = phone.trim();
      }

      return setDoc(doc(db, 'users', user.uid), userData, { merge: true });
    }

    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');

    function showError(msg) {
      errorMsg.textContent = msg; errorMsg.style.display = 'block';
      successMsg.style.display = 'none';
    }
    function showSuccess(msg) {
      successMsg.textContent = msg; successMsg.style.display = 'block';
      errorMsg.style.display = 'none';
    }
    function translateError(code) {
      const map = {
        'auth/email-already-in-use': 'Этот email уже зарегистрирован.',
        'auth/invalid-email': 'Неверный формат email.',
        'auth/weak-password': 'Пароль слишком слабый. Минимум 8 символов.',
        'auth/network-request-failed': 'Ошибка сети. Проверьте интернет.',
      };
      return map[code] || 'Ошибка: ' + code;
    }

    // Email/Password registration
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const firstName = document.getElementById('firstName').value.trim();
      const lastName = document.getElementById('lastName').value.trim();
      const email = document.getElementById('email').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirmPassword').value;
      const btn = document.getElementById('submitBtn');

      if (password !== confirm) { showError('Пароли не совпадают!'); return; }

      btn.disabled = true; btn.textContent = 'Создаём аккаунт...';

      try {
        const cred = await createUserWithEmailAndPassword(auth, email, password);
        await updateProfile(cred.user, { displayName: firstName + ' ' + lastName });

        // Calculate 7-day trial expiration
        const trialEndDate = new Date();
        trialEndDate.setDate(trialEndDate.getDate() + 7);

        localStorage.setItem('user', JSON.stringify({
          uid: cred.user.uid,
          firstName,
          lastName,
          email,
          phone,
          trialActive: true,
          trialEndDate: trialEndDate.toISOString(),
          subscriptionType: 'trial'
        }));

        try {
          await saveUserToFirestore(cred.user, firstName, lastName, phone, {
            trialActive: true,
            trialEndDate: trialEndDate,
            subscriptionType: 'trial',
            registrationDate: serverTimestamp()
          });
          console.log('✅ Firestore: пользователь сохранён с пробным периодом');
        } catch (fsErr) {
          console.error('❌ Firestore error:', fsErr.code, fsErr.message);
        }

        showSuccess('🎉 Аккаунт создан! Вам предоставлен бесплатный доступ на 7 дней!');
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000);
      } catch (err) {
        showError(translateError(err.code));
        btn.disabled = false; btn.textContent = 'Создать аккаунт';
      }
    });

    // Google registration
    document.getElementById('googleBtn').addEventListener('click', async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        const parts = (user.displayName || '').split(' ');
        const firstName = parts[0] || user.email.split('@')[0];
        const lastName = parts.slice(1).join(' ') || '';

        // Calculate 7-day trial expiration
        const trialEndDate = new Date();
        trialEndDate.setDate(trialEndDate.getDate() + 7);

        localStorage.setItem('user', JSON.stringify({
          uid: user.uid,
          firstName,
          lastName,
          email: user.email,
          trialActive: true,
          trialEndDate: trialEndDate.toISOString(),
          subscriptionType: 'trial'
        }));

        try {
          await saveUserToFirestore(user, firstName, lastName, '', {
            trialActive: true,
            trialEndDate: trialEndDate,
            subscriptionType: 'trial',
            registrationDate: serverTimestamp()
          });
          console.log('✅ Firestore: пользователь сохранён (Google) с пробным периодом');
        } catch (fsErr) {
          console.error('❌ Firestore error (Google):', fsErr.code, fsErr.message);
        }
        window.location.href = 'dashboard.html';
      } catch (err) {
        if (err.code !== 'auth/popup-closed-by-user') showError(translateError(err.code));
      }
    });
  </script>
</body>

</html>
