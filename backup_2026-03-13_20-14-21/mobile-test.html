<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mobile Test - Simulator</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
            color: white;
        }

        .info {
            padding: 20px;
            text-align: center;
        }

        .screen-info {
            background: rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            margin: 20px;
        }

        .test-button {
            display: block;
            width: 90%;
            margin: 20px auto;
            padding: 15px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        iframe {
            width: 100%;
            height: calc(100vh - 200px);
            border: none;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="info">
        <h1>📱 Mobile Test</h1>
        <div class="screen-info">
            <p><strong>Screen Width:</strong> <span id="width"></span>px</p>
            <p><strong>Screen Height:</strong> <span id="height"></span>px</p>
            <p><strong>Device Pixel Ratio:</strong> <span id="dpr"></span></p>
        </div>
        <button class="test-button" onclick="openSimulator()">Open Simulator</button>
    </div>

    <script>
        function updateScreenInfo() {
            document.getElementById('width').textContent = window.innerWidth;
            document.getElementById('height').textContent = window.innerHeight;
            document.getElementById('dpr').textContent = window.devicePixelRatio;
        }

        function openSimulator() {
            window.location.href = 'simulator.html';
        }

        updateScreenInfo();
        window.addEventListener('resize', updateScreenInfo);
    </script>
</body>

</html>
