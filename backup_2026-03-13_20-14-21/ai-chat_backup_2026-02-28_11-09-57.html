<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Чат Помощник - Dispatcher Training</title>
  <!-- Google Fonts - Inter (modern, bold) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-weight: 600;
      /* Bold by default */
      overflow: hidden;
      background: #0a0e1a;
    }

    /* Animated Background */
    @keyframes backgroundMove {

      0%,
      100% {
        transform: translate(0, 0) scale(1) rotate(0deg);
      }

      33% {
        transform: translate(-8%, 8%) scale(1.08) rotate(2deg);
      }

      66% {
        transform: translate(8%, -8%) scale(1.05) rotate(-2deg);
      }
    }

    @keyframes fadeOut {
      from {
        opacity: 1;
      }

      to {
        opacity: 0;
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .fade-out {
      animation: fadeOut 0.8s ease-out forwards;
    }

    /* Ray Background - Bolt Style */
    .ray-background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      pointer-events: none;
      user-select: none;
    }

    .ray-bg-base {
      position: absolute;
      inset: 0;
      background: #0a0e1a;
    }

    .ray-gradient {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background:
        radial-gradient(circle at 25% 35%, rgba(139, 92, 246, 0.2), transparent 55%),
        radial-gradient(circle at 75% 65%, rgba(59, 130, 246, 0.18), transparent 55%),
        radial-gradient(circle at 50% 50%, rgba(99, 102, 241, 0.12), transparent 60%);
    }

    .ray-rings {
      display: none;
    }

    /* Main Container */
    .main-container {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      width: 100%;
      overflow: hidden;
      background: #0a0e1a;
    }

    /* Announcement Badge */
    .announcement-wrapper {
      position: absolute;
      top: 50px;
      z-index: 10;
    }

    @media (min-width: 640px) {
      .announcement-wrapper {
        top: 70px;
      }
    }

    .announcement-badge {
      display: none;
      position: relative;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      min-height: 32px;
      border-radius: 9999px;
      font-size: 10px;
      overflow: hidden;
      transition: all 0.3s ease;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
      backdrop-filter: blur(20px) saturate(140%);
      box-shadow: inset 0 1px rgba(255, 255, 255, 0.2),
        inset 0 -1px rgba(0, 0, 0, 0.1),
        0 8px 32px -8px rgba(0, 0, 0, 0.1),
        0 0 0 1px rgba(255, 255, 255, 0.08);
    }

    @media (min-width: 640px) {
      .announcement-badge {
        gap: 8px;
        padding: 8px 20px;
        min-height: 40px;
        font-size: 11px;
      }
    }

    .announcement-badge:hover {
      transform: scale(1.02);
    }

    .announcement-badge:active {
      transform: scale(0.98);
    }

    .badge-overlay {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      pointer-events: none;
      opacity: 0.7;
      mix-blend-mode: overlay;
      background: radial-gradient(ellipse at center top, rgba(255, 255, 255, 0.15) 0%, transparent 70%);
    }

    .badge-glow {
      position: absolute;
      top: -1px;
      left: 50%;
      transform: translateX(-50%);
      height: 2px;
      width: 100px;
      opacity: 0.6;
      background: linear-gradient(90deg,
          transparent 0%,
          rgba(37, 119, 255, 0.8) 20%,
          rgba(126, 93, 225, 0.8) 50%,
          rgba(59, 130, 246, 0.8) 80%,
          transparent 100%);
      filter: blur(0.5px);
    }

    .badge-icon {
      position: relative;
      z-index: 10;
      color: white;
      width: 16px;
      height: 16px;
    }

    .badge-text {
      position: relative;
      z-index: 10;
      color: white;
      font-weight: 500;
    }

    /* Content Container */
    .content-container {
      position: absolute;
      top: 58%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 100%;
      height: 100%;
      overflow: hidden;
      padding: 0 16px;
    }

    @media (min-width: 640px) {
      .content-container {
        top: 52%;
      }
    }

    /* Title Section - Compact & Modern */
    .title-section {
      text-align: center;
      margin-bottom: 24px;
      animation: slideInFromTop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes slideInFromTop {
      0% {
        opacity: 0;
        transform: translateY(-30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .main-title {
      font-size: 24px;
      font-weight: 800;
      color: white;
      letter-spacing: -0.03em;
      margin-bottom: 8px;
      padding: 0 10px;
      line-height: 1.2;
    }

    @media (min-width: 640px) {
      .main-title {
        font-size: 42px;
        padding: 0;
      }
    }

    .title-gradient {
      background: linear-gradient(135deg, #8b5cf6, #6366f1, #3b82f6);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      background-size: 200% 200%;
      animation: gradientShift 3s ease infinite;
    }

    @keyframes gradientShift {

      0%,
      100% {
        background-position: 0% 50%;
      }

      50% {
        background-position: 100% 50%;
      }
    }

    .subtitle {
      font-size: 12px;
      font-weight: 500;
      color: rgba(255, 255, 255, 0.6);
      padding: 0 10px;
      max-width: 500px;
      margin: 0 auto;
      line-height: 1.5;
    }

    @media (min-width: 640px) {
      .subtitle {
        font-size: 15px;
        padding: 0;
      }
    }

    /* Chat Input Container */
    .chat-input-wrapper {
      display: none;
      /* Hidden initially, shown when chat starts */
      width: 100%;
      max-width: 700px;
      margin-bottom: 16px;
      margin-top: 8px;
    }

    @media (min-width: 640px) {
      .chat-input-wrapper {
        margin-bottom: 32px;
      }
    }

    .input-container {
      position: relative;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
    }

    .input-border-glow {
      position: absolute;
      inset: -1px;
      border-radius: 12px;
      background: linear-gradient(to bottom, rgba(255, 255, 255, 0.08), transparent);
      pointer-events: none;
    }

    @media (min-width: 640px) {
      .input-border-glow {
        border-radius: 16px;
      }
    }

    .input-box {
      position: relative;
      border-radius: 10px;
      /* Меньше радиус */
      background: #1e1e22;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.08), 0 2px 20px rgba(0, 0, 0, 0.4);
      max-width: 500px;
      /* Ограничение ширины */
      margin: 0 auto;
      /* Центрирование */
    }

    @media (min-width: 640px) {
      .input-box {
        border-radius: 12px;
        max-width: 600px;
      }
    }

    .textarea-wrapper {
      position: relative;
    }

    .chat-textarea {
      width: 100%;
      resize: none;
      background: transparent;
      font-size: 11px;
      color: white;
      padding: 14px 14px 10px 14px;
      border: none;
      outline: none;
      min-height: 60px;
      max-height: 150px;
      font-family: inherit;
    }

    @media (min-width: 640px) {
      .chat-textarea {
        font-size: 12px;
        padding: 20px 20px 12px 20px;
        min-height: 80px;
        max-height: 200px;
      }
    }

    .chat-textarea::placeholder {
      color: #5a5a5f;
    }

    .input-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2px 6px 4px 6px;
      /* Минимальный padding */
    }

    @media (min-width: 640px) {
      .input-controls {
        padding: 3px 10px 6px 10px;
      }
    }

    .left-controls {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .attach-button {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 24px;
      /* Меньше */
      height: 24px;
      border-radius: 9999px;
      background: rgba(255, 255, 255, 0.08);
      color: #8a8a8f;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    @media (min-width: 640px) {
      .attach-button {
        width: 30px;
        height: 30px;
      }
    }

    .attach-button:hover {
      background: rgba(255, 255, 255, 0.12);
      color: white;
    }

    .attach-button:active {
      transform: scale(0.95);
    }

    /* Pulse and Glow Effect */
    .pulse-glow {
      position: relative;
      animation: pulseGlow 2s ease-in-out infinite;
    }

    @keyframes pulseGlow {

      0%,
      100% {
        box-shadow: 0 0 10px rgba(139, 92, 246, 0.5),
          0 0 20px rgba(139, 92, 246, 0.3),
          0 0 30px rgba(139, 92, 246, 0.2);
        transform: scale(1);
      }

      50% {
        box-shadow: 0 0 20px rgba(139, 92, 246, 0.8),
          0 0 30px rgba(139, 92, 246, 0.5),
          0 0 40px rgba(139, 92, 246, 0.3);
        transform: scale(1.05);
      }
    }

    /* Hint Tooltip */
    .hint-tooltip {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-left: 12px;
      padding: 0;
      background: transparent;
      border: none;
      animation: fadeInOut 3s ease-in-out infinite;
      position: relative;
      z-index: 10;
    }

    .hint-arrow {
      color: rgba(139, 92, 246, 1);
      animation: arrowBounce 1.5s ease-in-out infinite;
      flex-shrink: 0;
      transform: rotate(180deg);
    }

    .hint-text {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.9);
      white-space: nowrap;
      font-weight: 400;
    }

    @keyframes fadeInOut {

      0%,
      100% {
        opacity: 0.7;
      }

      50% {
        opacity: 1;
      }
    }

    @keyframes arrowBounce {

      0%,
      100% {
        transform: rotate(180deg) translateX(0);
      }

      50% {
        transform: rotate(180deg) translateX(-5px);
      }
    }

    @media (max-width: 768px) {
      .hint-tooltip {
        gap: 6px;
      }

      .hint-text {
        font-size: 10px;
      }
    }

    .attach-icon {
      width: 14px;
      height: 14px;
      transition: transform 0.2s;
    }

    @media (min-width: 640px) {
      .attach-icon {
        width: 16px;
        height: 16px;
      }
    }

    .attach-icon.rotated {
      transform: rotate(45deg);
    }

    .model-selector {
      position: relative;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 8px;
      border-radius: 9999px;
      font-size: 9px;
      font-weight: 500;
      color: #8a8a8f;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    @media (min-width: 640px) {
      .model-selector {
        gap: 6px;
        padding: 6px 10px;
        font-size: 10px;
      }
    }

    .model-selector:hover {
      color: white;
      background: rgba(255, 255, 255, 0.05);
    }

    .model-selector:active {
      transform: scale(0.95);
    }

    .model-icon {
      width: 14px;
      height: 14px;
      color: #3b82f6;
    }

    @media (min-width: 640px) {
      .model-icon {
        width: 16px;
        height: 16px;
      }
    }

    .chevron-icon {
      width: 12px;
      height: 12px;
      transition: transform 0.2s;
    }

    @media (min-width: 640px) {
      .chevron-icon {
        width: 14px;
        height: 14px;
      }
    }

    .chevron-icon.rotated {
      transform: rotate(180deg);
    }

    /* Model Dropdown */
    .model-dropdown {
      position: absolute;
      bottom: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-bottom: 12px;
      width: 90%;
      max-width: 500px;
      background: rgba(26, 26, 30, 0.98);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      overflow: hidden;
      z-index: 100;
      display: none;
    }

    .model-dropdown.active {
      display: block;
      animation: slideInUp 0.2s ease-out;
    }

    @keyframes slideInUp {
      from {
        opacity: 0;
        transform: translateX(-50%) translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }
    }

    .model-dropdown-header {
      padding: 16px 20px;
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #8a8a8f;
      text-align: center;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .model-options-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      padding: 16px;
    }

    @media (max-width: 640px) {
      .model-options-grid {
        grid-template-columns: 1fr;
      }
    }

    .model-option {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      padding: 20px 16px;
      cursor: pointer;
      transition: all 0.15s;
      border: 2px solid rgba(255, 255, 255, 0.1);
      background: rgba(255, 255, 255, 0.03);
      border-radius: 12px;
      width: 100%;
      text-align: center;
      color: #a0a0a5;
      position: relative;
    }

    .model-option:hover {
      background: rgba(255, 255, 255, 0.08);
      border-color: rgba(99, 102, 241, 0.3);
      color: white;
      transform: translateY(-2px);
    }

    .model-option.selected {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.5);
      color: white;
    }

    .model-option-icon {
      font-size: 36px;
      flex-shrink: 0;
    }

    .model-option-content {
      flex: 1;
      width: 100%;
    }

    .model-option-name {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .model-option-desc {
      font-size: 11px;
      color: #6a6a6f;
      line-height: 1.4;
    }

    .model-option.selected .model-option-desc {
      color: #a5b4fc;
    }

    .model-option-check {
      position: absolute;
      top: 8px;
      right: 8px;
      width: 20px;
      height: 20px;
      color: #6366f1;
      flex-shrink: 0;
      opacity: 0;
    }

    .model-option.selected .model-option-check {
      opacity: 1;
    }

    .right-controls {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    @media (min-width: 640px) {
      .right-controls {
        gap: 8px;
      }
    }

    .plan-button {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 500;
      color: #6a6a6f;
      background: transparent;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
    }

    .plan-button:hover {
      color: white;
      background: rgba(255, 255, 255, 0.05);
    }

    .plan-button.active {
      color: #6366f1;
      background: rgba(99, 102, 241, 0.15);
    }

    @media (max-width: 639px) {
      .plan-text {
        display: none;
      }
    }

    @media (min-width: 640px) {
      .plan-button {
        gap: 6px;
      }
    }

    .plan-icon {
      width: 16px;
      height: 16px;
    }

    .plan-text {
      display: none;
    }

    @media (min-width: 640px) {
      .plan-text {
        display: inline;
      }
    }

    .send-button {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      /* Меньше padding */
      border-radius: 9999px;
      font-size: 9px;
      font-weight: 500;
      background: #1488fc;
      color: white;
      border: none;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 0 20px rgba(20, 136, 252, 0.3);
    }

    @media (min-width: 640px) {
      .send-button {
        gap: 6px;
        padding: 7px 14px;
        font-size: 10px;
      }
    }

    .send-button:hover {
      background: #1a94ff;
    }

    .send-button:active {
      transform: scale(0.95);
    }

    .send-button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .send-text {
      display: none;
    }

    @media (min-width: 640px) {
      .send-text {
        display: inline;
      }
    }

    .send-icon {
      width: 14px;
      height: 14px;
    }

    @media (min-width: 640px) {
      .send-icon {
        width: 16px;
        height: 16px;
      }
    }

    /* Import Buttons */
    .import-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
      justify-content: center;
    }

    @media (min-width: 640px) {
      .import-section {
        flex-direction: row;
        gap: 16px;
      }
    }

    .import-label {
      font-size: 10px;
      color: #6a6a6f;
    }

    @media (min-width: 640px) {
      .import-label {
        font-size: 11px;
      }
    }

    .import-buttons {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
      max-width: 600px;
    }

    @media (min-width: 640px) {
      .import-buttons {
        gap: 8px;
      }
    }

    .import-button {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      border-radius: 9999px;
      font-size: 9px;
      font-weight: 500;
      border: 1px solid rgba(139, 92, 246, 0.3);
      background: rgba(10, 14, 39, 0.6);
      color: #a5b4fc;
      cursor: pointer;
      transition: all 0.2s;
    }

    @media (min-width: 640px) {
      .import-button {
        gap: 6px;
        padding: 6px 12px;
        font-size: 10px;
      }
    }

    .import-button:hover {
      background: rgba(139, 92, 246, 0.2);
      border-color: rgba(139, 92, 246, 0.5);
      color: white;
    }

    .import-button:active {
      transform: scale(0.95);
    }

    /* Animated Bubbles Section - Compact & Modern */
    .bubbles-section {
      width: 100%;
      max-width: 650px;
      margin: 0 auto;
      padding: 16px;
      min-height: 350px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .bubbles-container {
      position: relative;
      width: 100%;
      height: 350px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 16px;
    }

    .bubble {
      position: relative;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 12px 20px;
      border-radius: 20px;
      background: linear-gradient(135deg,
          rgba(139, 92, 246, 0.15),
          rgba(99, 102, 241, 0.1),
          rgba(59, 130, 246, 0.15));
      border: 1.5px solid rgba(139, 92, 246, 0.35);
      color: rgba(255, 255, 255, 0.95);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
      opacity: 0;
      transform: scale(0.85) translateY(15px);
      animation: bubbleAppear 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      box-shadow:
        0 4px 14px rgba(139, 92, 246, 0.18),
        0 2px 6px rgba(0, 0, 0, 0.12),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(16px) saturate(140%);
      -webkit-backdrop-filter: blur(16px) saturate(140%);
      text-align: center;
      line-height: 1.4;
      max-width: 90%;
    }

    @keyframes bubbleAppear {
      0% {
        opacity: 0;
        transform: scale(0.85) translateY(15px);
      }

      60% {
        transform: scale(1.03) translateY(-3px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    .bubble::before {
      content: '';
      position: absolute;
      inset: -2px;
      border-radius: 20px;
      background: linear-gradient(135deg,
          rgba(139, 92, 246, 0.5),
          rgba(59, 130, 246, 0.5));
      opacity: 0;
      filter: blur(6px);
      transition: opacity 0.35s;
      z-index: -1;
    }

    .bubble:hover {
      transform: translateY(-3px) scale(1.04);
      background: linear-gradient(135deg,
          rgba(139, 92, 246, 0.28),
          rgba(99, 102, 241, 0.2),

  <script>
    // Show random buttons (3 on mobile, 8 on desktop)
    function shuffleTopicButtons() {
      const container = document.getElementById('topicButtons');
      const buttons = Array.from(container.children);

      // Shuffle array
      for (let i = buttons.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [buttons[i], buttons[j]] = [buttons[j], buttons[i]];
      }

      // Determine how many buttons to show
      const maxButtons = window.innerWidth <= 768 ? 3 : 8;

      // Clear and add shuffled buttons
      container.innerHTML = '';
      buttons.forEach((btn, index) => {
        if (index < maxButtons) {
          container.appendChild(btn);
        }
      });
    }

    // Run on load
    shuffleTopicButtons();

    // Run on resize
    window.addEventListener('resize', shuffleTopicButtons);
  </script>

    // Simple translation function
    function translateText(text, toRussian = true) {
      if (!toRussian) return text; // If translating to English, return as is (would need reverse dictionary)

      let translated = text;

      // Replace each English word/phrase with Russian
      for (const [english, russian] of Object.entries(translations)) {
        const regex = new RegExp('\\b' + english + '\\b', 'gi');
        translated = translated.replace(regex, russian);
      }

      return translated;
    }

    function addMessage(text, type, isClickableReset = false) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${type}`;

      const avatar = document.createElement('div');
      avatar.className = 'message-avatar';
      avatar.textContent = type === 'user' ? '🚚' : '💼';

      const content = document.createElement('div');
      content.className = 'message-content';
      content.textContent = text;

      // Make message clickable if it's a reset message
      if (isClickableReset) {
        content.style.cursor = 'pointer';
        content.style.transition = 'all 0.2s';
        content.addEventListener('mouseover', () => {
          content.style.background = 'rgba(139, 92, 246, 0.2)';
          content.style.borderColor = 'rgba(139, 92, 246, 0.5)';
        });
        content.addEventListener('mouseout', () => {

          content.style.borderColor = 'rgba(255, 255, 255, 0.1)';
        });
        content.addEventListener('click', () => {
          resetChat();
        });
      }

      messageDiv.appendChild(avatar);
      messageDiv.appendChild(content);
      messagesWrapper.appendChild(messageDiv);

      // First scroll - instant (fast, no animation)
      chatMessagesContainer.style.scrollBehavior = 'auto';
      const scrollToBottom = () => {
        chatMessagesContainer.scrollTop = chatMessagesContainer.scrollHeight;
      };

      // Immediate fast scroll
      scrollToBottom();
      setTimeout(scrollToBottom, 50);
      setTimeout(scrollToBottom, 150);

      // For broker messages (assistant), add slow smooth scroll to bottom after delay
      if (type === 'assistant') {
        setTimeout(() => {
          // Very slow smooth scroll to the very bottom
          const start = chatMessagesContainer.scrollTop;
          const end = chatMessagesContainer.scrollHeight;
          const distance = end - start;
          const duration = 2000; // 2 seconds for very smooth animation
          let startTime = null;

          function animate(currentTime) {
            if (!startTime) startTime = currentTime;
            const elapsed = currentTime - startTime;
            const progress = Math.min(elapsed / duration, 1);

            // Ease-in-out for smooth acceleration and deceleration
            const easeProgress = progress < 0.5
              ? 2 * progress * progress
              : 1 - Math.pow(-2 * progress + 2, 2) / 2;

            chatMessagesContainer.scrollTop = start + (distance * easeProgress);

            if (progress < 1) {
              requestAnimationFrame(animate);
            }
          }

          requestAnimationFrame(animate);
        }, 800); // Start slow scroll after 800ms
      }
    }

    // Add suggestion buttons as bubbles in chat
    function addSuggestionBubbles(suggestions, analysisText) {
      // Limit suggestions to 3-4 random options
      let limitedSuggestions = suggestions;
      if (suggestions.length > 4) {
        // Shuffle and pick 3-4 suggestions
        const isMobile = window.innerWidth < 640;
        const numToShow = isMobile ? 3 : 4;

        // Shuffle array
        const shuffled = [...suggestions].sort(() => Math.random() - 0.5);
        limitedSuggestions = shuffled.slice(0, numToShow);
      }

      // First add analysis text
      if (analysisText) {
        addAnalysisBubble(analysisText);
      }

      // Then add suggestion buttons container
      const suggestionsDiv = document.createElement('div');
      suggestionsDiv.className = 'suggestions-bubble-container';
      suggestionsDiv.style.cssText = `
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin: 8px auto;
        max-width: 600px;
        animation: fadeInScale 0.4s ease-out;
      `;

      limitedSuggestions.forEach((suggestion, index) => {
        const suggestionText = typeof suggestion === 'string' ? suggestion : suggestion.text;
        const quality = typeof suggestion === 'object' ? suggestion.quality : 'normal';

        const btn = document.createElement('button');
        btn.textContent = suggestionText;

        // Check if mobile or desktop for responsive styling
        const isMobile = window.innerWidth < 640;

        btn.style.cssText = `
          padding: ${isMobile ? '6px 8px' : '12px 16px'};
          background: rgba(255, 255, 255, 0.05);
          border: 1px solid rgba(255, 255, 255, 0.1);
          border-radius: ${isMobile ? '10px' : '12px'};
          color: white;
          font-size: ${isMobile ? '9px' : '12px'};
          font-weight: 600;
          line-height: ${isMobile ? '1.3' : '1.6'};
          text-align: left;
          cursor: pointer;
          transition: all 0.2s;
          animation: fadeInScale 0.4s ease-out;
          animation-delay: ${index * 0.05}s;
          opacity: 0;
          animation-fill-mode: forwards;
        `;

        btn.onmouseover = () => {
          btn.style.background = 'rgba(255, 255, 255, 0.08)';
          btn.style.borderColor = 'rgba(255, 255, 255, 0.15)';
          btn.style.transform = 'translateX(4px)';
        };
        btn.onmouseout = () => {
          btn.style.background = 'rgba(255, 255, 255, 0.05)';
          btn.style.borderColor = 'rgba(255, 255, 255, 0.1)';
          btn.style.transform = 'translateX(0)';
        };
        btn.onclick = () => {
          // Prevent multiple clicks
          if (btn.classList.contains('selected')) return;
          btn.classList.add('selected');

          // Track statistics if quality exists
          if (quality && responseStats[quality] !== undefined) {
            responseStats[quality]++;
            window.lastResponseQuality = quality;
          }

          // Animate the selected button
          btn.style.animation = 'selectAndExpand 0.5s ease-out forwards';

          }, 500); // Wait 500ms for animation to complete

        suggestionsDiv.appendChild(btn);

    let conversationContext = {
      stage: 'greeting', // greeting, availability, details, rate, negotiation, booking
      loadAvailable: true,
      askedAbout: [],
      dispatcherName: null,
      companyName: null
    };

    function generateResponse(message) {
      const lower = message.toLowerCase();

      // Extract dispatcher name and company if mentioned
      if (!conversationContext.dispatcherName) {
        const nameMatch = message.match(/(?:my name is|i'm|im|this is)\s+([A-Z][a-z]+)/i);
        if (nameMatch) conversationContext.dispatcherName = nameMatch[1];
      }
      if (!conversationContext.companyName) {
        const companyMatch = message.match(/from\s+([A-Z][a-z]+(?:\s+[A-Z][a-z]+)*)/i);
        if (companyMatch) conversationContext.companyName = companyMatch[1];
      }

      // STAGE 1: GREETING
      if (conversationContext.stage === 'greeting') {
        if (lower.includes('hello') || lower.includes('hi') || lower.includes('hey') ||
          lower.includes('good morning') || lower.includes('good afternoon')) {
          conversationContext.stage = 'availability';
          const greeting = conversationContext.dispatcherName ?
            `Hi ${conversationContext.dispatcherName}! ` : 'Hello! ';
          return greeting + "Thanks for calling. What can I help you with today?";
        }

        if (lower.includes('calling about') || lower.includes('interested in') || lower.includes('load')) {
          conversationContext.stage = 'availability';
          return "Yes, we have several loads available. Which route are you interested in?";
        }
      }

      // STAGE 2: AVAILABILITY CHECK
      if (conversationContext.stage === 'availability' || lower.includes('available') ||
        lower.includes('still open') || lower.includes('still there')) {
        conversationContext.stage = 'details';
        return "Yes, the load is still available! It's going from Chicago, IL to Dallas, TX. 950 miles, Dry Van, 38,000 lbs. Pickup tomorrow at 8 AM. Are you interested?";
      }

      // STAGE 3: LOAD DETAILS
      if (lower.includes('detail') || lower.includes('tell me more') || lower.includes('information')) {
        conversationContext.askedAbout.push('details');
        return "Sure! Here are the details:\n• Route: Chicago, IL → Dallas, TX (950 miles)\n• Weight: 38,000 lbs (18 pallets)\n• Equipment: 53' Dry Van\n• Pickup: Tomorrow 8-10 AM\n• Delivery: 2 days, by 5 PM\n• Freight: General cargo, no special requirements\n\nWhat else would you like to know?";
      }

      // RATE QUESTIONS
      if (lower.includes('rate') || lower.includes('pay') || lower.includes('price') ||
        lower.includes('how much') || lower.includes('offer')) {
        conversationContext.stage = 'rate';
        conversationContext.askedAbout.push('rate');
        return "The rate for this load is $2.50 per mile, so that's $2,375 total for 950 miles. It's a good rate for this lane. Does that work for you?";
      }

      // NEGOTIATION
      if (lower.includes('higher') || lower.includes('more') || lower.includes('increase') ||
        lower.includes('can you do') || lower.match(/\$\d+/)) {
        conversationContext.stage = 'negotiation';
        const requestedRate = message.match(/\$?([\d,]+)/);
        if (requestedRate) {
          const amount = parseInt(requestedRate[1].replace(',', ''));
          if (amount > 2600) {
            return `I understand you're looking for $${amount}, but that's above our budget. The best I can do is $2.60 per mile ($2,470 total). This is a fair rate for this lane. Can we make it work?`;
          } else if (amount > 2400) {
            return `Okay, I can work with that. Let me check with my manager... Alright, I can do $${amount}. Let's book it! What's your MC number?`;
          }
        }
        return "I hear you. The market rate for this lane is around $2.50-2.70 per mile. I can bump it up to $2.60 per mile ($2,470 total). That's the best I can offer. What do you think?";
      }

      // EQUIPMENT QUESTIONS
      if (lower.includes('equipment') || lower.includes('truck') || lower.includes('trailer') ||
        lower.includes('dry van') || lower.includes('reefer')) {
        conversationContext.askedAbout.push('equipment');
        return "We need a 53-foot Dry Van with air ride suspension. No reefer needed. Make sure the trailer is clean and in good condition - this is valuable freight. Do you have that available?";
      }

      // PICKUP/DELIVERY TIME
      if (lower.includes('pickup') || lower.includes('delivery') || lower.includes('when') ||
        lower.includes('time') || lower.includes('schedule')) {
        conversationContext.askedAbout.push('schedule');
        return "Pickup is tomorrow between 8-10 AM at 123 Industrial Blvd, Chicago, IL. Delivery needs to be in 2 days by 5 PM at 456 Warehouse Dr, Dallas, TX. There's a 2-5 PM delivery window. Can your driver make that schedule?";
      }

      // DOCUMENTS
      if (lower.includes('document') || lower.includes('paperwork') || lower.includes('rate con') ||
        lower.includes('pod') || lower.includes('bol')) {
        conversationContext.askedAbout.push('documents');
        return "I'll send you the Rate Confirmation within 30 minutes after we book. You'll get the BOL at pickup. Make sure to get a signed POD at delivery and send it back to dispatch@company.com. We also need a copy of your MC Authority. Standard stuff!";
      }

      // PAYMENT TERMS
      if (lower.includes('payment') || lower.includes('quick pay') || lower.includes('factoring') ||
        lower.includes('how long') || lower.includes('days')) {
        conversationContext.askedAbout.push('payment');
        return "Standard payment is NET 30 days after we receive the POD. We do offer Quick Pay - 3% fee, and you get paid within 24 hours. We also work with factoring companies. Which payment option works best for you?";
      }

      // BOOKING/CONFIRMATION
      if (lower.includes('book') || lower.includes('take it') || lower.includes('deal') ||
        lower.includes('yes') || lower.includes('okay') || lower.includes('sounds good')) {
        conversationContext.stage = 'booking';
        return "Great! Let's book it. I need your MC number, truck number, and driver's name and phone number. Also, please confirm your email for the Rate Confirmation.";
      }

      // MC NUMBER PROVIDED
      if (lower.includes('mc') || lower.match(/\d{6,}/)) {
        return "Perfect! Got your MC number. I'm sending the Rate Confirmation to your email right now. You should receive it in the next few minutes. Make sure your driver is at the pickup location tomorrow between 8-10 AM. Contact number at pickup is John: 555-0123. Any other questions?";
      }

      // REJECTION/DECLINE
      if (lower.includes('no thanks') || lower.includes('not interested') || lower.includes('pass') ||
        lower.includes('too low') || lower.includes('can\'t do')) {
        return "No problem, I understand. Thanks for calling! If you change your mind or if you're looking for other loads, feel free to reach out. Have a great day!";
      }

      // THANK YOU
      if (lower.includes('thank') || lower.includes('appreciate')) {
        return "You're welcome! Safe travels and let me know if you need anything else. Good luck with the delivery!";
      }

      // DEFAULT RESPONSES
      const responses = [
        "Could you clarify that? Are you asking about the rate, pickup time, or something else?",
        "I want to make sure I understand correctly. Can you rephrase that?",
        "Let me know what specific information you need - rate, schedule, equipment requirements, or payment terms?",
        "I'm here to help! What would you like to know about this load?"
      ];

      return responses[Math.floor(Math.random() * responses.length)];
    }

    function sendMessage() {
      const message = chatInput.value.trim();
      if (!message) return;

      // Switch to chat view
      switchToChatView();

      // Add user message
      addMessage(message, 'user');

      chatInput.value = '';
      chatInput.style.height = 'auto';
      sendButton.disabled = true;

      // Show typing indicator
      showTypingIndicator();

      // Simulate AI response
      setTimeout(() => {
        hideTypingIndicator();
        const response = generateResponse(message);
        addMessage(response, 'assistant');

        // Add suggestion bubbles after broker's response
        setTimeout(() => {
          const suggestions = getDynamicSuggestions();
          const analysisText = getContextualAnalysis();
          addSuggestionBubbles(suggestions, analysisText);
        }, 300);
      }, 1500 + Math.random() * 1000);
    }

    function sendMessageFixed() {
      const message = chatInputFixed.value.trim();
      if (!message) return;

      // Add user message
      addMessage(message, 'user');

      chatInputFixed.value = '';
      chatInputFixed.style.height = 'auto';
      sendButtonFixed.disabled = true;

      // Collapse input after first message
      if (!firstMessageSent) {
        firstMessageSent = true;
        setTimeout(() => collapseInput(), 500);
      }

      showTypingIndicator();

      // Simulate AI response
      setTimeout(() => {
        hideTypingIndicator();
        const response = generateResponse(message);
        addMessage(response, 'assistant');

        // Add suggestion bubbles after broker's response
        setTimeout(() => {
          const suggestions = getDynamicSuggestions();
          const analysisText = getContextualAnalysis();
          addSuggestionBubbles(suggestions, analysisText);
        }, 300);
      }, 1500 + Math.random() * 1000);
    }

          response = brokerPhrases.mcConfirm[Math.floor(Math.random() * brokerPhrases.mcConfirm.length)];
          // Add load details
          response += ` ${context.origin} to ${context.destination} - ${context.miles} miles, ${context.weight} lbs. `;
          response += `Pickup ${context.pickup}, delivery ${context.delivery}. `;
          response += brokerPhrases.equipmentQuestion[Math.floor(Math.random() * brokerPhrases.equipmentQuestion.length)];
          break;

        case 'equipmentConfirm':
          response = filler + brokerPhrases.equipmentConfirm[Math.floor(Math.random() * brokerPhrases.equipmentConfirm.length)];
          break;

        case 'timingQuestion':
          const timingQ = brokerPhrases.timingQuestion[Math.floor(Math.random() * brokerPhrases.timingQuestion.length)];
          response = transition + timingQ.replace('{pickup}', context.pickup);
          break;

        case 'ratePresent':
          const rateP = brokerPhrases.ratePresent[Math.floor(Math.random() * brokerPhrases.ratePresent.length)];
          response = filler + rateP
            .replace('{rate}', context.rate)
            .replace('{miles}', context.miles)
            .replace('{perMile}', context.perMile);
          break;

        case 'negotiation':
          const negot = brokerPhrases.negotiation[Math.floor(Math.random() * brokerPhrases.negotiation.length)];
          response = negot.replace('{rate}', context.rate);
          break;

        case 'bookingConfirm':
          response = brokerPhrases.bookingConfirm[Math.floor(Math.random() * brokerPhrases.bookingConfirm.length)];
          // Add follow-up
          if (Math.random() > 0.5) {
            response += " " + brokerPhrases.followUp[Math.floor(Math.random() * brokerPhrases.followUp.length)];
          }
          break;

        case 'rejection':
          response = brokerPhrases.rejection[Math.floor(Math.random() * brokerPhrases.rejection.length)];
          break;

        default:
          response = context.fallback || "Let me know if you have any questions.";
      }

      return response;
    }

    function checkUserResponse(userMessage) {
      if (!conversationActive) return;

      // Check if this is the first dispatcher message
      if (!dispatcherMessageSent) {
        // This is dispatcher's first message, broker should respond with first question
        dispatcherMessageSent = true;

        showTypingIndicator();
        setTimeout(() => {
          hideTypingIndicator();
          const scenario = brokerScenarios[0];
          addMessage(scenario.question, 'assistant');

          // Scroll to show broker's message at the top (near reset button level)
          setTimeout(() => {
            const messages = messagesWrapper.querySelectorAll('.message');
            const lastBrokerMessage = messages[messages.length - 1];
            if (lastBrokerMessage) {
              // Scroll so the message is visible near the top
              const messageTop = lastBrokerMessage.offsetTop;
              chatMessagesContainer.scrollTop = messageTop - 100; // 100px from top (near reset button)
            }
          }, 100);

          // Add suggestion bubbles in chat
          setTimeout(() => {
            const analysisText = 'Брокер ответил на ваше приветствие. Теперь узнайте детали о грузе';
            if (scenario.suggestions) {
              addSuggestionBubbles(scenario.suggestions, analysisText);
            }
          }, 300);
        }, 1500);
        return;
      }

      if (conversationStep >= brokerScenarios.length) return;

      const scenario = brokerScenarios[conversationStep];
      const lowerMessage = userMessage.toLowerCase();

      // Check if this was a reject response
      const isReject = window.lastResponseQuality === 'reject';

      const hasKeywords = scenario.expectedKeywords.some(keyword => {
        if (keyword.startsWith('\\')) {
          return new RegExp(keyword).test(lowerMessage);
        }
        return lowerMessage.includes(keyword.toLowerCase());
      });

      conversationStep++;
      // Remove previous suggestion bubbles
      document.querySelectorAll('.suggestions-bubble-container').forEach(el => el.remove());

      showTypingIndicator();
      setTimeout(() => {
        hideTypingIndicator();

        if (isReject) {
          // Handle rejection - end conversation
          addMessage("I understand. Thanks for your time. Have a good day!", 'assistant');

          setTimeout(() => {
            // Show final statistics
            const total = responseStats.good + responseStats.normal + responseStats.bad + responseStats.reject;

            if (total > 0) {
              const goodPercent = ((responseStats.good / total) * 100).toFixed(1);
              const normalPercent = ((responseStats.normal / total) * 100).toFixed(1);
              const badPercent = ((responseStats.bad / total) * 100).toFixed(1);
              const rejectPercent = ((responseStats.reject / total) * 100).toFixed(1);

              // Calculate score from 1 to 10
              let score = 1;
              let scoreEmoji = '😞';
              let scoreComment = 'Нужно больше практики';

              // Calculate weighted score
              const weightedScore = (
                (responseStats.good * 10) +
                (responseStats.normal * 6) +
                (responseStats.bad * 3) +
                (responseStats.reject * 0)
              ) / total;

              score = Math.round(weightedScore);

              if (score >= 9) {
                scoreEmoji = '🌟';
                scoreComment = 'Превосходно!';
              } else if (score >= 8) {
                scoreEmoji = '⭐';
                scoreComment = 'Отлично!';
              } else if (score >= 7) {
                scoreEmoji = '😊';
                scoreComment = 'Хорошо!';
              } else if (score >= 6) {
                scoreEmoji = '🙂';
                scoreComment = 'Неплохо';
              } else if (score >= 5) {
                scoreEmoji = '😐';
                scoreComment = 'Средне';
              } else if (score >= 4) {
                scoreEmoji = '😕';
                scoreComment = 'Можно лучше';
              } else if (score >= 3) {
                scoreEmoji = '😟';
                scoreComment = 'Слабо';
              } else {
                scoreEmoji = '😞';
                scoreComment = 'Нужно больше практики';
              }

              const statsMessage = `📊 СТАТИСТИКА РАЗГОВОРА\n\n` +
                `✅ Профессиональный подход: ${responseStats.good} (${goodPercent}%)\n` +
                `⚠️ Хороший уровень: ${responseStats.normal} (${normalPercent}%)\n` +
                `🚫 Приемлемо: ${responseStats.bad} (${badPercent}%)\n` +
                `❌ Непрофессионально: ${responseStats.reject} (${rejectPercent}%)\n\n` +
                `━━━━━━━━━━━━━━━━━━━━\n` +
                `Всего ответов: ${total}\n\n` +
                `⭐ Итоговая оценка: ${score}/10 ${scoreEmoji}\n` +
                `${scoreComment}\n\n` +
                `👆 Нажмите на это сообщение для нового сценария`;

              addMessage(statsMessage, 'assistant', true);
            }

            conversationActive = false;
          }, 1500);

          return;
        }

        if (hasKeywords) {
          addMessage(scenario.goodResponse, 'assistant');
        } else {
          addMessage(scenario.badResponse, 'assistant');
          conversationStep--; // Stay on same step for wrong answer
        }

        // Scroll to show broker's message at the top (near reset button level)
        setTimeout(() => {
          const messages = messagesWrapper.querySelectorAll('.message');
          const lastBrokerMessage = messages[messages.length - 1];
          if (lastBrokerMessage) {
            // Scroll so the message is visible near the top
            const messageTop = lastBrokerMessage.offsetTop;
            chatMessagesContainer.scrollTop = messageTop - 100; // 100px from top (near reset button)
          }
        }, 100);

        setTimeout(() => {
          askNextQuestion(); // Always ask next question (or repeat current if wrong)
        }, 2000);
      }, 1500);

      // Reset quality flag
      window.lastResponseQuality = null;
    }

    // Override sendMessage functions
    const originalSendMessage = sendMessage;
    sendMessage = function () {
      const message = chatInput.value.trim();
      if (!message) return;

      if (!conversationActive) {
        startAutoConversation();
        return;
      }

      addMessage(message, 'user');
      chatInput.value = '';
      chatInput.style.height = 'auto';
      sendButton.disabled = true;

      checkUserResponse(message);
    };

    const originalSendMessageFixed = sendMessageFixed;
    sendMessageFixed = function () {
      const message = chatInputFixed.value.trim();
      if (!message) return;

      if (!conversationActive) {
        startAutoConversation();
        return;
      }

      addMessage(message, 'user');
      chatInputFixed.value = '';
      chatInputFixed.style.height = 'auto';
      sendButtonFixed.disabled = true;

      checkUserResponse(message);
    };

    // Override quickQuestion to start auto conversation
    const originalQuickQuestion = quickQuestion;
    quickQuestion = function (topic) {
      startAutoConversation();
    };

    // ============================================
    // ANIMATED BUBBLES FUNCTIONALITY
    // ============================================

    // Dispatcher greeting variations from Scenario 2 (Dallas to Memphis)
    const dispatcherGreetings = [
      // Professional/Good responses
      "Hi! Sarah from Quick Dispatch. Your Dallas to Memphis load - is it still open?",
      "Hello, this is Sarah with Quick Dispatch. Calling about the Dallas, TX to Memphis, TN load. Available?",
      "Good afternoon! Sarah from Quick Dispatch here. I saw your Dallas to Memphis posting. Still there?",

      // Casual but acceptable
      "Hey! Sarah, Quick Dispatch. Interested in your Dallas, TX to Memphis, TN run. Open?",
      "Hi there! This is Sarah from Quick Dispatch. Your Dallas to Memphis freight - still available?",

      // More casual
      "Morning! Sarah with Quick Dispatch calling. Dallas to Memphis load - can we discuss it?",
      "Hello! Sarah from Quick Dispatch. I'm looking at your DAL to MEM load. Still open?",

      // Very casual
      "Hi! This is Sarah, Quick Dispatch. Calling about the Dallas to Memphis shipment. Available?",
      "Good day! Sarah from Quick Dispatch here. Your Dallas, TX to Memphis, TN load - is it there?",
      "Hey there! Sarah with Quick Dispatch. Saw your Dallas to Memphis posting. Can we talk?"
    ];

    let currentBubbles = [];
    let bubbleInterval = null;

    function getRandomGreetings(count = 3) {
      // Always include at least one professional greeting (first 3 are professional)
      const professionalGreetings = dispatcherGreetings.slice(0, 3);
      const otherGreetings = dispatcherGreetings.slice(3);

      // Pick one professional greeting
      const professionalIndex = Math.floor(Math.random() * professionalGreetings.length);
      const selectedGreetings = [professionalGreetings[professionalIndex]];

      // Pick remaining greetings from all options
      const remainingCount = count - 1;
      const availableGreetings = dispatcherGreetings.filter(g => !selectedGreetings.includes(g));

      // Shuffle and pick
      const shuffled = availableGreetings.sort(() => Math.random() - 0.5);
      selectedGreetings.push(...shuffled.slice(0, remainingCount));

      // Shuffle final selection so professional one isn't always first
      return selectedGreetings.sort(() => Math.random() - 0.5);
    }

    function createBubble(text, delay = 0) {
      const bubblesContainer = document.getElementById('bubblesContainer');
      if (!bubblesContainer) return;

      setTimeout(() => {
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        bubble.textContent = text;
        bubble.style.animationDelay = '0s';

        // Random position within container (organic cloud layout)
        const containerWidth = bubblesContainer.offsetWidth;
        const containerHeight = bubblesContainer.offsetHeight;

        // Calculate random position in a circular area around center
        const angle = Math.random() * Math.PI * 2;
        const radius = Math.random() * Math.min(containerWidth, containerHeight) * 0.35; // 35% of container

        const centerX = containerWidth / 2;
        const centerY = containerHeight / 2;

        const x = centerX + Math.cos(angle) * radius;
        const y = centerY + Math.sin(angle) * radius;

        // Position bubble (accounting for its own size)
        bubble.style.left = `${x}px`;
        bubble.style.top = `${y}px`;
        bubble.style.transform = 'translate(-50%, -50%) scale(0.6)';

        // Click handler to start conversation
        bubble.addEventListener('click', () => {
          // Hide all bubbles with animation
          document.querySelectorAll('.bubble').forEach(b => {
            b.classList.add('bubble-hidden');
          });

          // Start conversation after animation
          setTimeout(() => {
            startAutoConversation();
          }, 500);
        });

        bubblesContainer.appendChild(bubble);
        currentBubbles.push(bubble);
      }, delay);
    }

    function removeBubble(bubble) {
      if (!bubble || !bubble.parentNode) return;

      bubble.classList.add('bubble-hidden');

      setTimeout(() => {
        if (bubble.parentNode) {
          bubble.parentNode.removeChild(bubble);
        }
        const index = currentBubbles.indexOf(bubble);
        if (index > -1) {
          currentBubbles.splice(index, 1);
        }
      }, 500);
    }

    function showRandomBubbles() {
      const bubblesContainer = document.getElementById('bubblesContainer');
      if (!bubblesContainer) return;

      // Clear existing bubbles
      currentBubbles.forEach(bubble => removeBubble(bubble));
      currentBubbles = [];

      // Show 3-4 bubbles (3 on mobile, 4 on desktop)
      const isMobile = window.innerWidth < 640;
      const numBubbles = isMobile ? 3 : 4;

      // Get random greetings with at least one professional
      const selectedGreetings = getRandomGreetings(numBubbles);

      // Create bubbles with staggered animation
      selectedGreetings.forEach((greeting, i) => {
        const delay = i * 150; // Stagger by 150ms
        createBubble(greeting, delay);
      });
    }

    function startBubbleRotation() {
      // Show initial bubbles
      showRandomBubbles();

      // Rotate bubbles every 5 seconds
      bubbleInterval = setInterval(() => {
        showRandomBubbles();
      }, 5000);
    }

    function stopBubbleRotation() {
      if (bubbleInterval) {
        clearInterval(bubbleInterval);
        bubbleInterval = null;
      }
    }

    // Initialize bubbles when page loads
    window.addEventListener('load', () => {
      const bubblesSection = document.getElementById('bubblesSection');
      if (bubblesSection) {
        startBubbleRotation();
      }
    });

    // Handle window resize
    window.addEventListener('resize', () => {
      if (currentBubbles.length > 0) {
        showRandomBubbles();
      }
    });

    // Stop bubble rotation when chat starts
    const originalStartAutoConversation = startAutoConversation;
    startAutoConversation = function () {
      stopBubbleRotation();
      originalStartAutoConversation();
    };
  </script>
</body>
