name: Deploy to Hostinger

on:
  workflow_dispatch:  # Запуск только вручную
  # push:
  #   branches:
  #     - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
      
    - name: Install lftp
      run: sudo apt-get update && sudo apt-get install -y lftp
      
    - name: Deploy via SFTP using lftp
      env:
        SSH_HOST: ${{ secrets.SSH_HOST }}
        SSH_PORT: ${{ secrets.SSH_PORT }}
        SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
        SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
      run: |
        # Setup SSH key
        mkdir -p ~/.ssh
        echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
        chmod 600 ~/.ssh/id_ed25519
        
        # Add host to known_hosts
        ssh-keyscan -p $SSH_PORT -H $SSH_HOST >> ~/.ssh/known_hosts 2>/dev/null
        
        # Deploy using lftp with SFTP
        lftp -e "
        set sftp:auto-confirm yes;
        set sftp:connect-program 'ssh -a -x -p $SSH_PORT -i ~/.ssh/id_ed25519';
        open sftp://$SSH_USERNAME@$SSH_HOST;
        mirror -R --verbose --delete --exclude .git/ --exclude .github/ --exclude node_modules/ --exclude .vscode/ --exclude '*.ps1' ./ /public_html/;
        bye
        "
