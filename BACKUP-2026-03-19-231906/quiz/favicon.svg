<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="capGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="tasselGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#FBBF24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#F59E0B;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Cap base (bottom part) -->
  <ellipse cx="50" cy="55" rx="35" ry="8" fill="url(#capGradient)" opacity="0.9"/>
  
  <!-- Cap top (flat board) -->
  <path d="M 15 45 L 50 35 L 85 45 L 50 55 Z" fill="url(#capGradient)"/>
  
  <!-- Cap 3D effect -->
  <path d="M 50 35 L 85 45 L 85 48 L 50 58 L 50 55 Z" fill="#6366F1" opacity="0.7"/>
  <path d="M 50 35 L 15 45 L 15 48 L 50 58 L 50 55 Z" fill="#8B5CF6" opacity="0.8"/>
  
  <!-- Tassel string -->
  <line x1="85" y1="45" x2="88" y2="70" stroke="url(#tasselGradient)" stroke-width="2"/>
  
  <!-- Tassel -->
  <circle cx="88" cy="72" r="4" fill="url(#tasselGradient)"/>
  <path d="M 88 76 L 85 82 L 88 80 L 91 82 Z" fill="#F59E0B"/>
</svg>
