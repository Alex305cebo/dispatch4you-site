name: 🚀 Deploy Dispatch4you Courses to Hostinger

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '**.py'
      - '**.ps1'
      - '**.bat'
      - '**.sh'
  workflow_dispatch:

jobs:
  deploy:
    name: 📦 Deploy to dispatch4you.com
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
      
    - name: 🔐 Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        ssh-keyscan -p ${{ secrets.SSH_PORT }} -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || true
      
    - name: 🚀 Deploy via SSH Git Pull
      run: |
        ssh -o StrictHostKeyChecking=no -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_USERNAME }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
          echo "📂 Переход в директорию..."
          cd /home/${{ secrets.SSH_USERNAME }}/domains/dispatch4you.com/public_html || exit 1
          
          echo "🔄 Обновление репозитория..."
          git fetch origin main
          git reset --hard origin/main
          
          echo "✅ Деплой завершен!"
          echo "📊 Последний коммит:"
          git log -1 --oneline
        ENDSSH
        
    - name: ✅ Deploy Complete
      run: |
        echo "========================================="
        echo "✅ Деплой успешно завершен!"
        echo "🌐 Сайт: https://dispatch4you.com"
        echo "⏰ Время: $(date)"
        echo "========================================="
