<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Пример использования эталонной навигации</title>

    <!-- Подключаем стили навигации -->
    <link rel="stylesheet" href="../includes/navigation-styles.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0a0e1a;
            color: #ffffff;
            padding-top: 60px;
            /* Важно! Отступ для фиксированной шапки */
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 32px;
        }

        h1 {
            font-size: 48px;
            margin-bottom: 20px;
        }

        p {
            font-size: 18px;
            line-height: 1.6;
            color: #94a3b8;
        }
    </style>
</head>

<body>
    <!-- Placeholder для навигации -->
    <div id="navigation-placeholder"></div>

    <!-- Основной контент страницы -->
    <div class="container">
        <h1>Пример страницы с эталонной навигацией</h1>
        <p>Эта страница демонстрирует, как подключить эталонную навигацию к любой странице сайта.</p>
        <p>Навигация загружается автоматически из файла <code>includes/navigation.html</code></p>
    </div>

    <!-- Скрипт для загрузки навигации -->
    <script>
        fetch('../includes/navigation.html')
            .then(response => response.text())
            .then(data => {
                document.getElementById('navigation-placeholder').innerHTML = data;
            })
            .catch(error => {
                console.error('Failed to load navigation:', error);
            });
    </script>
</body>

</html>
