<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="capGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e293b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f172a;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- Graduation cap - professional style -->
  <!-- Cap board (top flat part) -->
  <path d="M 50 25 L 15 38 L 50 51 L 85 38 Z" fill="url(#capGrad)" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Cap board top surface (3D effect) -->
  <path d="M 15 38 L 50 25 L 85 38 L 50 32 Z" fill="#334155"/>
  
  <!-- Cap base (sits on head) -->
  <ellipse cx="50" cy="51" rx="22" ry="8" fill="url(#capGrad)" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Cap cylinder body -->
  <path d="M 28 51 L 28 65 Q 28 72 50 72 Q 72 72 72 65 L 72 51" fill="#1e293b" stroke="#000000" stroke-width="1.5"/>
  
  <!-- Bottom of cylinder -->
  <ellipse cx="50" cy="72" rx="22" ry="7" fill="#0f172a"/>
  
  <!-- Tassel cord -->
  <line x1="85" y1="38" x2="88" y2="75" stroke="#fbbf24" stroke-width="3.5" stroke-linecap="round"/>
  
  <!-- Tassel knot at top -->
  <circle cx="85" cy="38" r="3.5" fill="#fbbf24"/>
  
  <!-- Tassel main body -->
  <ellipse cx="88" cy="77" rx="6" ry="8" fill="#fbbf24"/>
  
  <!-- Tassel threads -->
  <line x1="84" y1="84" x2="81" y2="90" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="88" y1="85" x2="88" y2="91" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  <line x1="92" y1="84" x2="95" y2="90" stroke="#fbbf24" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Button/decoration on top -->
  <circle cx="50" cy="25" r="4" fill="#fbbf24" stroke="#d97706" stroke-width="1"/>
  
  <!-- Shine effect -->
  <circle cx="35" cy="30" r="8" fill="#ffffff" opacity="0.15"/>
  
  <!-- Additional detail lines on cap -->
  <ellipse cx="50" cy="51" rx="18" ry="6" fill="none" stroke="#475569" stroke-width="0.5" opacity="0.5"/>
</svg>
