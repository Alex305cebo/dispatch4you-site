<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Карьера | Курсы Диспетчера</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
    }

    :root {
      --primary: #6366f1;
      --secondary: #8b5cf6;
      --accent: #ec4899;
      --bg-dark: #0f172a;
      --bg-darker: #020617;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --text-muted: #64748b;
    }

    [data-theme="light"] {
      --bg-dark: #ffffff;
      --bg-darker: #f8fafc;
      --text-primary: #0f172a;
      --text-secondary: #475569;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg-darker);
      color: var(--text-primary);
      line-height: 1.6;
      overflow-x: hidden;
      width: 100%;
      max-width: 100vw;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 32px;
    }

    .page-header {
      padding: 140px 0 80px;
      text-align: center;
    }

    .page-title {
      font-size: clamp(48px, 6vw, 72px);
      font-weight: 900;
      margin-bottom: 24px;
    }

    .gradient-text {
      background: linear-gradient(135deg, #6366f1, #8b5cf6, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .page-subtitle {
      font-size: 20px;
      color: var(--text-secondary);
      max-width: 700px;
      margin: 0 auto;
    }

    .content-section {
      padding: 60px 0;
    }

    .job-grid {
      display: grid;
      gap: 32px;
      margin-top: 60px;
    }

    .job-card {
      background: rgba(255, 255, 255, 0.03);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 24px;
      padding: 40px;
      transition: all 0.4s;
    }

    .job-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 20px 60px rgba(99, 102, 241, 0.2);
    }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .job-title {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .job-badge {
      display: inline-block;
      padding: 6px 16px;
      background: rgba(99, 102, 241, 0.2);
      border-radius: 100px;
      font-size: 12px;
      font-weight: 600;
      color: var(--primary);
    }

    .job-meta {
      display: flex;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
      font-size: 15px;
      color: var(--text-muted);
    }

    .job-meta-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .job-description {
      color: var(--text-secondary);
      line-height: 1.8;
      margin-bottom: 24px;
    }

    .job-requirements {
      margin-bottom: 24px;
    }

    .job-requirements h4 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 16px;
      color: var(--text-primary);
    }

    .job-requirements ul {
      list-style: none;
    }

    .job-requirements li {
      padding: 8px 0;
      color: var(--text-secondary);
    }

    .job-requirements li::before {
      content: '✓';
      color: var(--primary);
      margin-right: 12px;
      font-weight: 700;
    }

    .btn-apply {
      display: inline-block;
      padding: 16px 32px;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: white;
      text-decoration: none;
      border-radius: 12px;
      font-weight: 600;
      transition: all 0.3s;
    }

    .btn-apply:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(99, 102, 241, 0.4);
    }

    .footer {
      padding: 80px 0 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: 80px;
    }

    .footer-content {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 48px;
      margin-bottom: 48px;
    }

    .footer-section h4 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 20px;
    }

    .footer-section p {
      color: var(--text-secondary);
      font-size: 14px;
      line-height: 1.7;
    }

    .footer-section a {
      display: block;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 12px;
      transition: all 0.3s ease;
    }

    .footer-section a:hover {
      color: var(--primary);
      transform: translateX(4px);
    }

    .footer-bottom {
      text-align: center;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 968px) {
      .footer-content {
        grid-template-columns: repeat(2, 1fr);
        gap: 40px;
      }
    }

    @media (max-width: 568px) {
      .footer {
        padding: 40px 0 30px;
        margin-top: 48px;
      }

      .footer-content {
        display: grid !important;
        grid-template-columns: repeat(3, 1fr) !important;
        gap: 20px !important;
      }

      .footer .container {
        padding: 0 16px;
      }

      .footer-section {
        text-align: center;
      }

      .footer-section:first-child {
        grid-column: 1 / -1;
        margin-bottom: 16px;
        text-align: center;
      }

      .footer-section:first-child h4 {
        font-size: 18px;
        margin-bottom: 8px;
      }

      .footer-section:first-child p {
        font-size: 13px;
        line-height: 1.5;
        max-width: 400px;
        margin: 0 auto;
      }

      .footer-section h4 {
        font-size: 14px;
        margin-bottom: 12px;
      }

      .footer-section a {
        margin-bottom: 8px;
        font-size: 12px;
      }

      .footer-section p {
        font-size: 12px;
        line-height: 1.4;
      }

      .footer-section a:hover {
        transform: translateX(0);
      }

      .footer-bottom {
        font-size: 11px;
        padding-top: 20px;
      }
    }

    @media (max-width: 400px) {
      .footer .container {
        padding: 0 12px;
      }

      .footer-content {
        grid-template-columns: 1fr !important;
        gap: 24px !important;
      }

      .footer-section:first-child {
        margin-bottom: 20px;
      }

      .footer-section h4 {
        font-size: 16px;
      }

      .footer-section a {
        font-size: 13px;
      }
    }

    .footer-section a {
      display: block;
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 14px;
      margin-bottom: 12px;
      transition: all 0.3s;
    }

    .footer-section a:hover {
      color: var(--primary);
      transform: translateX(4px);
    }

    .footer-bottom {
      text-align: center;
      padding-top: 32px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      color: var(--text-muted);
      font-size: 14px;
    }

    @media (max-width: 768px) {
      .container {
        padding: 0 24px;
      }

      .nav-links {
        display: none;
      }

      .job-header {
        flex-direction: column;
      }
    }
  </style>

</head>

  <!-- Mobile menu script -->
  <script>
    // Mobile menu functionality
    const mobileMenuToggle = document.getElementById('mobileMenuToggle');
    const mobileMenu = document.getElementById('mobileMenu');
    const mobileMenuOverlay = document.getElementById('mobileMenuOverlay');

    if (mobileMenuToggle && mobileMenu && mobileMenuOverlay) {
      mobileMenuToggle.addEventListener('click', () => {
        mobileMenu.classList.toggle('active');
        mobileMenuOverlay.classList.toggle('active');
        document.body.style.overflow = mobileMenu.classList.contains('active') ? 'hidden' : '';
      });

      mobileMenuOverlay.addEventListener('click', () => {
        mobileMenu.classList.remove('active');
        mobileMenuOverlay.classList.remove('active');
        document.body.style.overflow = '';
      });
    }
  </script>
